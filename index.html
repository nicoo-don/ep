function formatTime(totalSeconds) {
  const s = Math.max(0, Math.round(totalSeconds));
  const m = Math.floor(s / 60);
  const r = s % 60;
  return `${m}:${r.toString().padStart(2, '0')}`;
}

function sectionColor(label) {
  const base = label.replace(/\s*\d+$/, '').trim();
  return SECTION_COLORS[base] || 'bg-zinc-500';
}

function sectionTextColor(label) {
  const base = label.replace(/\s*\d+$/, '').trim();
  return SECTION_TEXT_DARK.has(base) ? 'text-zinc-900' : 'text-white';
}

  if (hasBeat && hasSong) return 'complete';
  if (hasBeat) return 'beatOnly';
  return 'inProgress';
}

  const copy = [...arr];
  const [item] = copy.splice(from, 1);
  copy.splice(to, 0, item);

/* =========================================================================
   PERSISTENCE
   Two layers:
   1) PROJECT DATA (EP title, tracks, structure, lyrics, notes, beat/song
      metadata) -> if Firebase is configured, this is saved to and synced
      live from Cloud Firestore, so it's shared across everyone and every
      device. If Firebase isn't configured, it falls back to this
      browser's IndexedDB — local-only, but still durable across refreshes.
   2) AUDIO FILES (the actual uploaded mp3/wav bytes) -> if Firebase is
      configured, they're uploaded to Firebase Storage and referenced by a
      normal https:// URL stored in the project data, so every
      collaborator can actually hear them. Without Firebase, audio stays
      in this browser's IndexedDB only (not shared).
   ========================================================================= */

const DB_NAME = 'ep_music_builder_db';
const DB_VERSION = 1;
const META_KEY = 'project_v1';

function openDB() {
  return new Promise((resolve, reject) => {
    if (!('indexedDB' in window)) {
      reject(new Error('IndexedDB non disponibile'));
      return;
    }
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = () => {
      const idb = req.result;
      if (!idb.objectStoreNames.contains('meta')) idb.createObjectStore('meta');
      if (!idb.objectStoreNames.contains('audio')) idb.createObjectStore('audio');
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function idbGet(storeName, key) {
  const idb = await openDB();
  return new Promise((resolve, reject) => {
    const tx = idb.transaction(storeName, 'readonly');
    const req = tx.objectStore(storeName).get(key);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function idbSet(storeName, key, value) {
  const idb = await openDB();
  return new Promise((resolve, reject) => {
    const tx = idb.transaction(storeName, 'readwrite');
    tx.objectStore(storeName).put(value, key);
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}

async function idbDelete(storeName, key) {
  const idb = await openDB();
  return new Promise((resolve, reject) => {
    const tx = idb.transaction(storeName, 'readwrite');
    tx.objectStore(storeName).delete(key);
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}

// Save the project's text/JSON data using whichever backend is available.
async function saveProjectData(data) {
  if (cloudReady) {
    await setDoc(doc(db, ...PROJECT_DOC_PATH), data);
    return 'cloud';
  }
  await idbSet('meta', META_KEY, data);
  return 'local';
}

async function loadProjectData() {
  if (cloudReady) {
    const snap = await getDoc(doc(db, ...PROJECT_DOC_PATH));
    return snap.exists() ? snap.data() : null;
  }
  return idbGet('meta', META_KEY);
}

// Live subscription to the shared project (Firebase only). Calls back
// every time the document changes — including the very first read, and
// every time any collaborator saves.
function subscribeToProjectData(onData, onError) {
  if (!cloudReady) return () => {};
  return onSnapshot(
    doc(db, ...PROJECT_DOC_PATH),
    (snap) => onData(snap.exists() ? snap.data() : null, snap.metadata.hasPendingWrites),
    (err) => onError && onError(err)
  );
}

// Upload an audio file to Firebase Storage and return its public URL.
async function uploadAudioToCloud(kind, id, file) {
  const fileRef = storageRef(storage, `${kind}/${id}`);
  await uploadBytes(fileRef, file);
  return getDownloadURL(fileRef);
}

async function deleteAudioFromCloud(kind, id) {
  if (!cloudReady) return;
  try {
    await deleteObject(storageRef(storage, `${kind}/${id}`));
  } catch {
    // ignore — file may not exist, that's fine
  }
}

// Strip fields that should never be persisted as-is: blob: URLs only make
// sense in the tab that created them. Real https:// URLs (Firebase
// Storage) are kept, since they're valid for everyone, everywhere.
function sanitizeForSave(item) {
  if (item.audioUrl && item.audioUrl.startsWith('blob:')) {
    const { audioUrl, ...rest } = item;
    return rest;
  }
  return item;
}

// Same idea, but for the {id: patch} override maps used for edits made to
// PRELOADED beats/songs.
function sanitizeOverridesForSave(overrides) {
  const result = {};
  for (const [id, patch] of Object.entries(overrides || {})) {
    result[id] = sanitizeForSave(patch);
  }
  return result;
}

// Resolve a saved beat/song's audio: cloud URLs are used as-is (work for
// everyone); anything else falls back to whatever this browser has
// stored locally for that id.
async function resolveAudioUrl(item, kind) {
  if (item.audioUrl && /^https?:\/\//.test(item.audioUrl)) return item.audioUrl;
  try {
    const blob = await idbGet('audio', kind + '_' + item.id);
    return blob ? URL.createObjectURL(blob) : null;
  } catch {
    return null;
  }
}

/* =========================================================================
   AUDIO PREVIEW (simulated)
   ========================================================================= */

function BeatPreviewPlayer({ beat, isPlaying, progress, onToggle, onSeek }) {
  const barRef = useRef(null);

  const handleSeek = (e) => {
    if (!onSeek || !barRef.current) return;
    const rect = barRef.current.getBoundingClientRect();
    const fraction = Math.min(1, Math.max(0, (e.clientX - rect.left) / rect.width));
    onSeek(fraction);
  };

  return (
    <div className="flex items-center gap-2">
      <button
        onClick={onToggle}
        className="flex items-center justify-center w-8 h-8 rounded-full bg-zinc-800 hover:bg-violet-500/30 border border-zinc-700 hover:border-violet-400 transition-colors text-zinc-200 hover:text-lime-300 shrink-0"
        aria-label={isPlaying ? 'Pausa anteprima' : 'Riproduci anteprima'}
      >
        {isPlaying ? <Pause size={14} /> : <Play size={14} />}
      </button>
      <div
        ref={barRef}
        onClick={handleSeek}
        title="Clicca per spostare la posizione"
        className="flex-1 h-1.5 rounded-full bg-zinc-800 overflow-hidden relative cursor-pointer hover:h-2 transition-[height]"
      >
        <div
          className={`h-full ${isPlaying ? 'bg-lime-400' : 'bg-zinc-500'} transition-[width] duration-100 linear`}
          style={{ width: `${progress}%` }}
        />
      </div>
      <span className="font-mono text-[11px] text-zinc-500 w-10 text-right shrink-0">
        {formatTime(beat.duration)}
      </span>
    </div>
  );
}

      <div className="flex items-start justify-between gap-2">
        <div>

          </div>
        </div>
        <div className="flex items-center gap-1.5 shrink-0">

            <button
              onClick={() => setEditOpen(true)}
              title={`Modifica ${itemWord}`}

            >
              <Pencil size={13} />
            </button>
          )}
          {beat.isCustom && onDelete && (
            <button
              onClick={() => onDelete(beat.id)}
              title={`Rimuovi ${itemWord}`}
              className="w-7 h-7 rounded-lg border border-zinc-700 hover:border-red-400 hover:text-red-400 text-zinc-500 flex items-center justify-center transition-colors"
            >
              <Trash2 size={13} />
            </button>
          )}
          <div className="w-9 h-9 rounded-lg bg-gradient-to-br from-violet-500/30 to-blue-500/30 border border-zinc-700 flex items-center justify-center">
            <ItemIcon size={16} className="text-violet-300" />
          </div>
        </div>
      </div>

      <div className="flex flex-wrap gap-1.5">
        {beat.isCustom && (
          <Pill className={GENRE_COLORS.custom}>
            <Upload size={10} className="mr-1" /> tua {itemWord}
          </Pill>
        )}
        {beat.tags.map((t) => (
          <Pill key={t} className={GENRE_COLORS[beat.genre] || 'bg-zinc-700/40 text-zinc-300 border-zinc-600'}>
            {t}
          </Pill>
        ))}
      </div>

      {audioMissing ? (
        <label className="flex items-center justify-between gap-2 rounded-lg border border-dashed border-amber-500/40 bg-amber-500/5 px-3 py-2 cursor-pointer hover:border-amber-400 transition-colors">
          <span className="flex items-center gap-1.5 text-xs text-amber-300">
            <AlertTriangle size={13} /> Audio non presente su questo dispositivo
          </span>
          <span className="text-[11px] text-amber-200 underline shrink-0">Allega file</span>
          <input
            type="file"
            accept="audio/*"
            className="hidden"
            onChange={(e) => {
              const f = e.target.files[0];
              if (f && onAttachAudio) onAttachAudio(beat, f);
            }}
          />
        </label>
      ) : (
        <BeatPreviewPlayer
          beat={beat}
          isPlaying={isPlaying}
          progress={isCurrent ? playState.progress : 0}
          onToggle={() => onTogglePlay(beat)}
          onSeek={(fraction) => onSeek && onSeek(beat, fraction)}
        />
      )}

      {!compact && (
        <button
          onClick={() => setNotesOpen((v) => !v)}
          className="flex items-center gap-1 text-xs text-zinc-500 hover:text-lime-300 transition-colors self-start"
        >
          <Sparkles size={12} />
          {notesOpen ? 'Nascondi note ispirazione' : 'Note ispirazione'}
        </button>
      )}
      {!compact && notesOpen && (
        <textarea
          value={notesValue}
          onChange={(e) => onNotesChange(beat.id, e.target.value)}
          placeholder={`Idee, riferimenti, atmosfere per questa ${itemWord}...`}
          rows={2}
          className="w-full resize-none rounded-lg bg-zinc-950 border border-zinc-800 focus:border-violet-500 outline-none text-xs text-zinc-300 p-2 placeholder:text-zinc-600"
        />
      )}

      <button
        onClick={() => onAddToEp(beat)}
        className="mt-auto flex items-center justify-center gap-1.5 rounded-lg bg-gradient-to-r from-violet-600 to-blue-600 hover:from-violet-500 hover:to-blue-500 text-white text-sm font-medium py-2 transition-all"
      >
        <Plus size={15} /> Aggiungi all'EP
      </button>
    </div>
  );
}

function TopBar({ epTitle, setEpTitle, progress, lastSaved, saveError, storageMode, syncing, onSync }) {
  const [editing, setEditing] = useState(false);
  const [draft, setDraft] = useState(epTitle);

  const commit = () => {
    setEpTitle(draft.trim() || 'Untitled EP');
    setEditing(false);
  };

  return (
    <header className="border-b border-zinc-800 bg-zinc-950/60 px-4 md:px-8 py-4 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3">
      <div className="flex items-center gap-2 min-w-0">
        {editing ? (
          <>
            <input
              autoFocus
              value={draft}
              onChange={(e) => setDraft(e.target.value)}
              onKeyDown={(e) => e.key === 'Enter' && commit()}
              className="font-display text-xl sm:text-2xl font-bold bg-transparent border-b-2 border-violet-500 outline-none text-zinc-100 min-w-0"
            />
            <button onClick={commit} className="text-lime-400 hover:text-lime-300">
              <Check size={18} />
            </button>
          </>
        ) : (
          <>
            <h1 className="font-display text-xl sm:text-2xl font-bold text-zinc-100 truncate">{epTitle}</h1>
            <button onClick={() => { setDraft(epTitle); setEditing(true); }} className="text-zinc-500 hover:text-violet-400 shrink-0">
              <Pencil size={14} />
            </button>
          </>
        )}
      </div>

      <div className="flex items-center gap-3">
        <div className="hidden sm:flex flex-col w-40">
          <div className="flex justify-between text-[11px] text-zinc-500 mb-1">
            <span>Avanzamento EP</span>
            <span className="font-mono">{Math.round(progress)}%</span>
          </div>
          <ProgressBar value={progress} />
        </div>

        {storageMode === 'cloud' && (
          <button
            onClick={onSync}
            disabled={syncing}
            title="Forza un controllo di sincronizzazione con il cloud"
            className="w-8 h-8 rounded-lg border border-zinc-700 hover:border-violet-400 text-zinc-400 hover:text-violet-300 flex items-center justify-center transition-colors disabled:opacity-50 shrink-0"
          >
            <RefreshCw size={14} className={syncing ? 'animate-spin' : ''} />
          </button>
        )}

        {saveError ? (
          <Pill className="bg-red-500/15 text-red-300 border-red-500/40 whitespace-nowrap" title="Il salvataggio non è riuscito. Le modifiche potrebbero non persistere dopo un aggiornamento della pagina.">
            <span className="w-1.5 h-1.5 rounded-full bg-red-400 mr-1.5" />
            Salvataggio non riuscito
          </Pill>
        ) : storageMode === 'cloud' ? (
          <Pill className="bg-violet-500/15 text-violet-300 border-violet-500/40 whitespace-nowrap" title="Il progetto (testi, struttura, beat/canzoni, audio) è salvato online: tu e i tuoi amici vedete sempre la stessa versione, su qualsiasi dispositivo.">
            <Cloud size={11} className="mr-1.5" />
            Cloud · salvato {lastSaved}
          </Pill>
        ) : (
          <Pill className="bg-zinc-800/60 text-zinc-400 border-zinc-700 whitespace-nowrap" title="Nessun database collegato: il progetto viene salvato solo in questo browser e non è condiviso con altri dispositivi o persone.">
            <HardDrive size={11} className="mr-1.5 text-amber-400" />
            Solo locale · salvato {lastSaved}
          </Pill>
        )}

    </header>

function EditMediaForm({ item, onSave, onClose, kind = 'beat' }) {
  const [name, setName] = useState(item.name || '');
  const [bpm, setBpm] = useState(item.bpm ?? '');
  const [key, setKey] = useState(item.key || '');
  const [genre, setGenre] = useState(item.genre || '');
  const [mood, setMood] = useState(item.mood || '');
  const [tags, setTags] = useState((item.tags || []).join(', '));

  const itemWord = kind === 'song' ? 'canzone' : 'beat';

  const handleSave = () => {
    if (!name.trim()) return;
    onSave(item.id, {
      name: name.trim(),
      bpm: Number(bpm) || 0,
      key: key.trim() || '—',
      genre: genre.trim().toLowerCase() || 'custom',
      mood: mood.trim().toLowerCase() || 'custom',
      tags: tags.split(',').map((t) => t.trim()).filter(Boolean),

    onClose();

  return (
    <div className="rounded-xl border border-violet-500/40 bg-zinc-900/80 p-4 space-y-3">
      <div className="flex items-center justify-between">
        <h3 className="font-display font-semibold text-zinc-100 flex items-center gap-2">
          <Pencil size={16} className="text-violet-400" /> Modifica {itemWord}

        <button onClick={onClose} className="text-zinc-500 hover:text-zinc-200">
          <X size={16} />
        </button>
      </div>

      <div className="grid sm:grid-cols-2 gap-3">
        <Field label={kind === 'song' ? 'Nome canzone' : 'Nome beat'} value={name} onChange={setName} placeholder={kind === 'song' ? 'Es. La mia canzone' : 'Es. Il mio beat'} />
        <Field label="BPM" value={bpm} onChange={setBpm} placeholder="Es. 140" type="number" />
        <Field label="Tonalità" value={key} onChange={setKey} placeholder="Es. F minor" />
        <Field label="Genere" value={genre} onChange={setGenre} placeholder="Es. trap" />
        <Field label="Mood" value={mood} onChange={setMood} placeholder="Es. dark" />
        <Field label="Tag (separati da virgola)" value={tags} onChange={setTags} placeholder="trap, dark, custom" />
      </div>

      <div className="flex gap-2">
        <button
          onClick={handleSave}
          disabled={!name.trim()}
          className="flex items-center justify-center gap-2 rounded-lg bg-gradient-to-r from-violet-600 to-blue-600 hover:from-violet-500 hover:to-blue-500 disabled:opacity-40 text-white text-sm font-medium px-4 py-2.5 transition-all"
        >
          <Check size={15} /> Salva modifiche
        </button>
        <button
          onClick={onClose}
          className="flex items-center justify-center gap-2 rounded-lg border border-zinc-700 hover:border-zinc-500 text-zinc-300 text-sm font-medium px-4 py-2.5 transition-colors"
        >
          Annulla
        </button>
      </div>
    </div>
  );
}

   MEDIA LIBRARY (used for both Beats and Songs)
   ========================================================================= */

function MediaLibrary({ items, onAddToEp, playState, onTogglePlay, onSeek, itemNotes, onNotesChange, onDeleteItem, onEditItem, onAttachAudio, kind = 'beat' }) {
  const [genre, setGenre] = useState('all');
  const [bpmRange, setBpmRange] = useState('all');
  const [mood, setMood] = useState('all');

  const isSong = kind === 'song';
  const itemWord = isSong ? 'canzone' : 'beat';
  const emptyMsg = isSong ? 'Nessuna canzone corrisponde ai filtri selezionati.' : 'Nessun beat corrisponde ai filtri selezionati.';

  const genres = ['all', ...new Set(items.map((b) => b.genre))];
  const moods = ['all', ...new Set(items.map((b) => b.mood))];

  const filtered = items.filter((b) => {
    if (genre !== 'all' && b.genre !== genre) return false;
    if (mood !== 'all' && b.mood !== mood) return false;
    if (bpmRange === 'slow' && b.bpm >= 100) return false;
    if (bpmRange === 'mid' && (b.bpm < 100 || b.bpm > 139)) return false;
    if (bpmRange === 'fast' && b.bpm < 140) return false;
    return true;
  });

  return (
    <div className="space-y-5">
      <div>
        <p className="text-violet-400 text-xs font-mono uppercase tracking-widest mb-1">Catalogo</p>
        <h2 className="font-display text-2xl font-bold text-zinc-100">{isSong ? 'Libreria Canzoni' : 'Libreria Beat'}</h2>
        <p className="text-zinc-500 text-sm mt-1">
          {isSong
            ? 'Sfoglia, filtra e gestisci le canzoni: demo, idee e riferimenti per l\'EP.'
            : 'Sfoglia, filtra e scegli i beat per costruire i tuoi brani.'}
        </p>
      </div>

      <div className="flex flex-wrap gap-3">
        <Select label="Genere" value={genre} onChange={setGenre} options={genres} />
        <Select label="BPM" value={bpmRange} onChange={setBpmRange} options={['all', 'slow', 'mid', 'fast']} labels={{ all: 'Tutti', slow: '< 100', mid: '100–139', fast: '≥ 140' }} />
        <Select label="Mood" value={mood} onChange={setMood} options={moods} />
      </div>

      <div className="grid sm:grid-cols-2 lg:grid-cols-3 gap-4">
        {filtered.map((item) => (
          <BeatCard
            key={item.id}
            beat={item}
            kind={kind}
            onAddToEp={onAddToEp}
            playState={playState}
            onTogglePlay={onTogglePlay}
            onSeek={onSeek}
            notesValue={itemNotes[item.id] ?? item.notes}
            onNotesChange={onNotesChange}
            onDelete={onDeleteItem}
            onEdit={onEditItem}
            onAttachAudio={onAttachAudio}
          />
        ))}
        {filtered.length === 0 && (
          <div className="col-span-full rounded-xl border border-dashed border-zinc-800 p-8 text-center text-zinc-500">
            {items.length === 0
              ? (isSong
                  ? "Nessuna canzone in libreria."
                  : "Nessun beat in libreria.")
              : emptyMsg}
          </div>
        )}
      </div>
    </div>
  );
}

/* =========================================================================
   SONG BUILDER
   ========================================================================= */

const PX_PER_SECOND = 2.4;

function ArrangementStrip({ track, onUpdateSection, onDuplicateSection, onDeleteSection, onReorder }) {
  const total = trackTotalDuration(track);
  const [isPlaying, setIsPlaying] = useState(false);
  const [time, setTime] = useState(0);
  const dragIndexRef = useRef(null);

  useEffect(() => {
    if (!isPlaying) return;
    const interval = setInterval(() => {
      setTime((t) => {
        const next = t + 0.5; // 0.5s of song time per tick -> fast preview scrub
        if (next >= total) {
          setIsPlaying(false);
          return 0;
        }
        return next;
      });
    }, 60);
    return () => clearInterval(interval);
  }, [isPlaying, total]);

  const togglePlay = () => {
    if (total === 0) return;
    setIsPlaying((p) => !p);
  };

  const playheadPx = (time / Math.max(total, 1)) * (total * PX_PER_SECOND);

  return (
    <div className="space-y-3">
      <div className="flex items-center justify-between gap-3 flex-wrap">
        <h4 className="font-display font-semibold text-zinc-200 flex items-center gap-2">
          <Layers size={16} className="text-violet-400" /> Struttura del brano
        </h4>
        <div className="flex items-center gap-3">
          <button
            onClick={togglePlay}
            disabled={total === 0}
            className="flex items-center gap-1.5 rounded-lg bg-zinc-800 hover:bg-violet-500/30 border border-zinc-700 hover:border-violet-400 px-3 py-1.5 text-sm text-zinc-200 disabled:opacity-40 transition-colors"
          >
            {isPlaying ? <Pause size={14} /> : <Play size={14} />}
            Anteprima
          </button>
          <span className="font-mono text-xs text-zinc-400">
            {formatTime(time)} / {formatTime(total)}
          </span>
        </div>
      </div>

      <div className="rounded-xl border border-zinc-800 bg-zinc-950 p-3 overflow-x-auto">
        <div className="relative" style={{ minWidth: Math.max(total * PX_PER_SECOND, 320) }}>
          {/* timeline ruler */}
          <div className="flex items-end h-2 mb-1.5">
            {track.structure.map((s) => (
              <div
                key={s.id + '_ruler'}
                style={{ width: Math.max(s.duration * PX_PER_SECOND, 40) }}
                className="border-l border-zinc-800 h-full first:border-l-0"
              />
            ))}
          </div>

          {/* blocks */}
          <div className="flex gap-1">
            {track.structure.map((s, idx) => (
              <div
                key={s.id}
                draggable
                onDragStart={() => (dragIndexRef.current = idx)}
                onDragOver={(e) => e.preventDefault()}
                onDrop={() => {
                  if (dragIndexRef.current === null || dragIndexRef.current === idx) return;
                  onReorder(dragIndexRef.current, idx);
                  dragIndexRef.current = null;
                }}
                style={{ width: Math.max(s.duration * PX_PER_SECOND, 40) }}
                className={`group relative rounded-md ${sectionColor(s.label)} ${sectionTextColor(s.label)} px-2 py-2 cursor-grab active:cursor-grabbing flex flex-col gap-0.5 min-h-[52px] shadow-sm hover:brightness-110 transition-[filter]`}
              >
                <GripVertical size={11} className="absolute top-1 right-1 opacity-50" />
                <span className="text-[11px] font-semibold leading-tight truncate pr-3">{s.label}</span>
                <span className="text-[10px] font-mono opacity-80">{formatTime(s.duration)}</span>
              </div>
            ))}
            {track.structure.length === 0 && (
              <div className="text-zinc-600 text-sm py-4">Nessuna sezione. Aggiungine una qui sotto.</div>
            )}
          </div>

          {/* playhead */}
          {total > 0 && (
            <div
              className="absolute top-0 bottom-0 w-px bg-lime-400 shadow-[0_0_8px_rgba(190,255,60,0.8)] transition-[left] duration-75 linear"
              style={{ left: `${playheadPx}px` }}
            >
              <div className="w-2 h-2 rounded-full bg-lime-400 -translate-x-1/2 -mt-1" />
            </div>
          )}
        </div>
      </div>

      {/* section editor list */}
      <div className="space-y-2">
        {track.structure.map((s, idx) => (
          <div key={s.id} className="rounded-lg border border-zinc-800 bg-zinc-900/70 p-3 flex flex-col sm:flex-row sm:items-start gap-3">
            <div className={`w-2 self-stretch rounded-full ${sectionColor(s.label)} shrink-0`} />
            <div className="flex-1 grid sm:grid-cols-[1fr_auto] gap-2 items-start">
              <div className="flex flex-col gap-2">
                <div className="flex items-center gap-2">
                  <input
                    value={s.label}
                    onChange={(e) => onUpdateSection(idx, { label: e.target.value })}
                    className="bg-transparent border-b border-zinc-700 focus:border-violet-500 outline-none text-sm font-medium text-zinc-100 w-40"
                  />
                  <div className="flex items-center gap-1 text-xs text-zinc-500 font-mono">
                    <Clock size={12} />
                    <input
                      type="number"
                      min={0}
                      value={s.duration}
                      onChange={(e) => onUpdateSection(idx, { duration: Math.max(0, Number(e.target.value)) })}
                      className="w-14 bg-zinc-950 border border-zinc-800 rounded px-1.5 py-0.5 text-zinc-200 outline-none focus:border-violet-500"
                    />
                    sec
                  </div>
                </div>
                <textarea
                  value={s.notes}
                  onChange={(e) => onUpdateSection(idx, { notes: e.target.value })}
                  placeholder="Note personali su questa sezione (testo, melodia, riferimenti)..."
                  rows={1}
                  className="resize-none w-full bg-zinc-950 border border-zinc-800 focus:border-violet-500 outline-none rounded-md px-2 py-1.5 text-xs text-zinc-300 placeholder:text-zinc-600"
                />
              </div>
              <div className="flex sm:flex-col gap-1.5 justify-end">
                <button
                  onClick={() => onDuplicateSection(idx)}
                  title="Duplica sezione"
                  className="p-1.5 rounded-md border border-zinc-700 hover:border-blue-400 hover:text-blue-300 text-zinc-400 transition-colors"
                >
                  <Copy size={13} />
                </button>
                <button
                  onClick={() => onDeleteSection(idx)}
                  title="Elimina sezione"
                  className="p-1.5 rounded-md border border-zinc-700 hover:border-red-400 hover:text-red-400 text-zinc-400 transition-colors"
                >
                  <Trash2 size={13} />
                </button>
              </div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function SongBuilder({ track, allTracks, beats, songs, onChangeTitle, onChangeMood, onChangeBeat, onChangeSong, onChangeLyrics, onUpdateStructure, onAddToEp, playState, onTogglePlay, onSeek, onAttachAudio, beatNotes, onNotesChange, songNotes, onNotesChangeSong }) {
  const [pickerOpen, setPickerOpen] = useState(!track?.beatId);
  const [songPickerOpen, setSongPickerOpen] = useState(false);

  if (!track) {
    return (
      <div className="rounded-xl border border-dashed border-zinc-800 p-10 text-center text-zinc-500">
        <Layers size={28} className="mx-auto mb-2 text-zinc-700" />
        Nessun brano selezionato. Vai alla Dashboard o all'EP Tracker per scegliere o creare un brano.
      </div>
    );
  }

  const beat = beats.find((b) => b.id === track.beatId);
  const song = songs.find((s) => s.id === track.songId);

  // A beat already linked to ANOTHER track can't be picked here too — each
  // beat belongs to at most one song.
  const takenBeatIds = new Set(
    (allTracks || [])
      .filter((t) => t.id !== track.id && t.beatId)
      .map((t) => t.beatId)
  );
  const selectableBeats = beats.filter((b) => !takenBeatIds.has(b.id));
  const hiddenTakenCount = beats.length - selectableBeats.length;

  const updateSection = (idx, patch) => {
    const structure = track.structure.map((s, i) => (i === idx ? { ...s, ...patch } : s));
    onUpdateStructure(structure);
  };
  const duplicateSection = (idx) => {
    const item = { ...track.structure[idx], id: uid() };
    const structure = [...track.structure];
    structure.splice(idx + 1, 0, item);
    onUpdateStructure(structure);
  };
  const deleteSection = (idx) => {
    onUpdateStructure(track.structure.filter((_, i) => i !== idx));
  };
  const reorder = (from, to) => onUpdateStructure(moveItem(track.structure, from, to));
  const addSection = (type) => {
    const count = track.structure.filter((s) => s.label.startsWith(type)).length;
    const label = type === 'Hook' || type === 'Verse' || type === 'Bridge' ? `${type} ${count + 1}` : type;
    onUpdateStructure([...track.structure, { id: uid(), label, duration: DEFAULT_DURATIONS[type] ?? 15, notes: '' }]);
  };

  return (
    <div className="space-y-6">
      <div>
        <p className="text-violet-400 text-xs font-mono uppercase tracking-widest mb-1">Song Builder</p>
        <input
          value={track.title}
          onChange={(e) => onChangeTitle(e.target.value)}
          className="font-display text-2xl font-bold bg-transparent border-b-2 border-transparent focus:border-violet-500 outline-none text-zinc-100 w-full"
          placeholder="Titolo del brano"
        />
      </div>

      {/* Beat selection */}
      <div className="rounded-xl border border-zinc-800 bg-zinc-900/80 p-4">
        <div className="flex items-center justify-between mb-3">
          <h4 className="font-display font-semibold text-zinc-200 flex items-center gap-2">
            <Disc3 size={16} className="text-violet-400" /> Beat selezionato
          </h4>
          {beat && (
            <button onClick={() => setPickerOpen((v) => !v)} className="text-xs text-violet-300 hover:text-lime-300 transition-colors">
              {pickerOpen ? 'Chiudi selezione' : 'Cambia beat'}
            </button>
          )}
        </div>

        {beat && !pickerOpen ? (
          <div className="flex flex-wrap items-center gap-4">
            <button
              onClick={() => onTogglePlay(beat)}
              disabled={!beat.audioUrl}
              title={beat.audioUrl ? 'Riproduci/pausa beat' : 'Audio non disponibile su questo dispositivo'}
              className="flex items-center justify-center w-12 h-12 rounded-lg bg-gradient-to-br from-violet-500/30 to-blue-500/30 border border-zinc-700 hover:border-violet-400 disabled:opacity-40 transition-colors shrink-0"
            >
              {playState.id === beat.id && playState.playing ? (
                <Pause size={20} className="text-lime-300" />
              ) : (
                <Play size={20} className="text-violet-300" />
              )}
            </button>
            <div>
              <p className="font-semibold text-zinc-100">{beat.name}</p>
              <p className="text-xs text-zinc-500 font-mono">{beat.bpm} BPM · {beat.key} · {formatTime(beat.duration)}</p>
            </div>
            <div className="flex flex-wrap gap-1.5 ml-auto">
              {beat.tags.map((t) => (
                <Pill key={t} className={GENRE_COLORS[beat.genre] || 'bg-zinc-700/40 text-zinc-300 border-zinc-600'}>{t}</Pill>
              ))}
            </div>
          </div>
        ) : (
          <div className="space-y-3">
            {hiddenTakenCount > 0 && (
              <p className="text-xs text-zinc-500 flex items-center gap-1.5">
                <Link2Off size={12} />
                {hiddenTakenCount === 1
                  ? '1 beat non è mostrato perché già assegnato a un altro brano.'
                  : `${hiddenTakenCount} beat non sono mostrati perché già assegnati ad altri brani.`}
              </p>
            )}
            {selectableBeats.length === 0 ? (
              <p className="text-sm text-zinc-500">Nessun beat disponibile: sono tutti già assegnati ad altri brani.</p>
            ) : (
              <div className="grid sm:grid-cols-2 lg:grid-cols-3 gap-3">
                {selectableBeats.map((b) => (
                  <BeatCard
                    key={b.id}
                    beat={b}
                    compact
                    onAddToEp={() => { onChangeBeat(b.id); setPickerOpen(false); }}
                    playState={playState}
                    onTogglePlay={onTogglePlay}
                    onSeek={onSeek}
                    onAttachAudio={onAttachAudio}
                    notesValue={beatNotes[b.id] ?? b.notes}
                    onNotesChange={onNotesChange}
                  />
                ))}
              </div>
            )}
          </div>
        )}
      </div>

      {/* Reference song selection */}
      <div className="rounded-xl border border-zinc-800 bg-zinc-900/80 p-4">
        <div className="flex items-center justify-between mb-3">
          <h4 className="font-display font-semibold text-zinc-200 flex items-center gap-2">
            <Mic2 size={16} className="text-violet-400" /> Canzone di riferimento
            <span className="text-[11px] font-normal text-zinc-500">(opzionale)</span>
          </h4>
          <div className="flex items-center gap-3">
            {song && (
              <button onClick={() => onChangeSong(null)} className="flex items-center gap-1 text-xs text-zinc-500 hover:text-red-400 transition-colors">
                <Link2Off size={12} /> Rimuovi
              </button>
            )}
            <button onClick={() => setSongPickerOpen((v) => !v)} className="text-xs text-violet-300 hover:text-lime-300 transition-colors">
              {songPickerOpen ? 'Chiudi selezione' : song ? 'Cambia canzone' : 'Scegli canzone'}
            </button>
          </div>
        </div>

        {song && !songPickerOpen ? (
          <div className="flex flex-wrap items-center gap-4">
            <button
              onClick={() => onTogglePlay(song)}
              disabled={!song.audioUrl}
              title={song.audioUrl ? 'Riproduci/pausa canzone' : 'Audio non disponibile su questo dispositivo'}
              className="flex items-center justify-center w-12 h-12 rounded-lg bg-gradient-to-br from-violet-500/30 to-blue-500/30 border border-zinc-700 hover:border-violet-400 disabled:opacity-40 transition-colors shrink-0"
            >
              {playState.id === song.id && playState.playing ? (
                <Pause size={20} className="text-lime-300" />
              ) : (
                <Play size={20} className="text-violet-300" />
              )}
            </button>
            <div>
              <p className="font-semibold text-zinc-100">{song.name}</p>
              <p className="text-xs text-zinc-500 font-mono">{song.bpm} BPM · {song.key} · {formatTime(song.duration)}</p>
            </div>
            <div className="flex flex-wrap gap-1.5 ml-auto">
              {song.tags.map((t) => (
                <Pill key={t} className={GENRE_COLORS[song.genre] || 'bg-zinc-700/40 text-zinc-300 border-zinc-600'}>{t}</Pill>
              ))}
            </div>
          </div>
        ) : songPickerOpen ? (
          songs.length === 0 ? (
            <p className="text-sm text-zinc-500">Nessuna canzone in libreria. Caricane una dalla Libreria Canzoni.</p>
          ) : (
            <div className="grid sm:grid-cols-2 lg:grid-cols-3 gap-3">
              {songs.map((s) => (
                <BeatCard
                  key={s.id}
                  beat={s}
                  kind="song"
                  compact
                  onAddToEp={() => { onChangeSong(s.id); setSongPickerOpen(false); }}
                  playState={playState}
                  onTogglePlay={onTogglePlay}
                  onSeek={onSeek}
                  onAttachAudio={onAttachAudio}
                  notesValue={songNotes[s.id] ?? s.notes}
                  onNotesChange={onNotesChangeSong}
                />
              ))}
            </div>
          )
        ) : (
          <p className="text-sm text-zinc-500">Nessuna canzone collegata a questo brano.</p>
        )}
      </div>

      {/* Mood tag */}
      <div className="rounded-xl border border-zinc-800 bg-zinc-900/80 p-4">
        <h4 className="font-display font-semibold text-zinc-200 mb-3 flex items-center gap-2">
          <Sparkles size={16} className="text-violet-400" /> Mood del brano
        </h4>
        <div className="flex flex-wrap gap-2">
          {MOOD_OPTIONS.map((m) => (
            <button
              key={m}
              onClick={() => onChangeMood(track.mood === m ? '' : m)}
              className={`px-3 py-1.5 rounded-full text-xs font-medium border capitalize transition-colors ${
                track.mood === m
                  ? 'bg-lime-400 text-zinc-900 border-lime-400'
                  : 'bg-zinc-800/50 text-zinc-400 border-zinc-700 hover:border-violet-400 hover:text-zinc-200'
              }`}
            >
              {m}
            </button>
          ))}
        </div>
      </div>

      {/* Lyrics */}
      <div className="rounded-xl border border-zinc-800 bg-zinc-900/80 p-4">
        <h4 className="font-display font-semibold text-zinc-200 mb-3 flex items-center gap-2">
          <FileText size={16} className="text-violet-400" /> Testo del brano
        </h4>
        <textarea
          value={track.lyrics || ''}
          onChange={(e) => onChangeLyrics(e.target.value)}
          placeholder={'Scrivi qui il testo del brano...\n\n[Intro]\n...\n\n[Verse 1]\n...\n\n[Hook]\n...'}
          rows={10}
          className="w-full resize-y rounded-lg bg-zinc-950 border border-zinc-800 focus:border-violet-500 outline-none text-sm text-zinc-200 p-3 placeholder:text-zinc-600 font-mono leading-relaxed"
        />
      </div>

      {/* Arrangement */}
      <div className="rounded-xl border border-zinc-800 bg-zinc-900/80 p-4">
        <ArrangementStrip
          track={track}
          onUpdateSection={updateSection}
          onDuplicateSection={duplicateSection}
          onDeleteSection={deleteSection}
          onReorder={reorder}
        />

        <div className="mt-4">
          <p className="text-xs text-zinc-500 mb-2">Aggiungi sezione</p>
          <div className="flex flex-wrap gap-2">
            {SECTION_TYPE_OPTIONS.map((type) => (
              <button
                key={type}
                onClick={() => addSection(type)}
                className={`flex items-center gap-1 px-2.5 py-1.5 rounded-md text-xs font-medium text-zinc-200 border border-zinc-700 hover:border-violet-400 hover:bg-zinc-800 transition-colors`}
              >
                <span className={`w-2 h-2 rounded-full ${sectionColor(type)}`} />
                <Plus size={11} /> {type}
              </button>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

/* =========================================================================
   EP TRACKER
   ========================================================================= */

function EPTracker({ tracks, beats, songs, onReorder, onOpenTrack, onDeleteTrack, onAddTrack }) {
  const dragIndexRef = useRef(null);
  const completed = tracks.filter(trackIsComplete).length;
  const progress = tracks.length ? (completed / tracks.length) * 100 : 0;

  return (
    <div className="space-y-5">
      <div>
        <p className="text-violet-400 text-xs font-mono uppercase tracking-widest mb-1">Tracklist</p>
        <h2 className="font-display text-2xl font-bold text-zinc-100">EP Tracker</h2>
        <p className="text-zinc-500 text-sm mt-1">Riordina i brani, controlla lo stato e gestisci la tua tracklist.</p>
      </div>

      <div className="rounded-xl border border-zinc-800 bg-zinc-900/80 p-4">
        <div className="flex justify-between text-sm text-zinc-300 mb-2">
          <span>Avanzamento complessivo</span>
          <span className="font-mono text-lime-400">{completed}/{tracks.length} completati</span>
        </div>
        <ProgressBar value={progress} />
      </div>

      <div className="space-y-2">
        {tracks.map((t, idx) => {
          const beat = beats.find((b) => b.id === t.beatId);
          const song = songs.find((s) => s.id === t.songId);
          return (
            <div
              key={t.id}
              draggable
              onDragStart={() => (dragIndexRef.current = idx)}
              onDragOver={(e) => e.preventDefault()}
              onDrop={() => {
                if (dragIndexRef.current === null || dragIndexRef.current === idx) return;
                onReorder(dragIndexRef.current, idx);
                dragIndexRef.current = null;
              }}
              className="rounded-xl border border-zinc-800 bg-zinc-900/80 p-3 flex items-center gap-3 hover:border-violet-500/40 transition-colors cursor-grab active:cursor-grabbing"
            >
              <GripVertical size={16} className="text-zinc-600 shrink-0" />
              <span className="font-mono text-xs text-zinc-500 w-6 text-center shrink-0">{idx + 1}</span>

              {/* mini structure preview */}
              <div className="hidden sm:flex h-6 rounded overflow-hidden shrink-0 w-32 border border-zinc-800">
                {t.structure.length === 0 ? (
                  <div className="w-full bg-zinc-800" />
                ) : (
                  t.structure.map((s) => (
                    <div
                      key={s.id}
                      className={sectionColor(s.label)}
                      style={{ width: `${(s.duration / Math.max(trackTotalDuration(t), 1)) * 100}%` }}
                    />
                  ))
                )}
              </div>

              <div className="flex-1 min-w-0">
                <p className="font-medium text-zinc-100 truncate">{t.title}</p>
                <p className="text-xs text-zinc-500 truncate">
                  {beat ? `${beat.name} · ${beat.bpm} BPM` : 'Nessun beat'} · {t.structure.length} sezioni · {formatTime(trackTotalDuration(t))}
                  {t.mood && <span className="capitalize"> · {t.mood}</span>}
                  {song && <span> · ref: {song.name}</span>}
                </p>
              </div>

              <MediaStatusBadge status={trackMediaStatus(t)} />

              <button onClick={() => onOpenTrack(t.id)} className="p-2 rounded-md border border-zinc-700 hover:border-violet-400 hover:text-violet-300 text-zinc-400 transition-colors shrink-0">
                <Pencil size={14} />
              </button>
              <button onClick={() => onDeleteTrack(t.id)} className="p-2 rounded-md border border-zinc-700 hover:border-red-400 hover:text-red-400 text-zinc-400 transition-colors shrink-0">
                <Trash2 size={14} />
              </button>
            </div>
          );
        })}

        {tracks.length === 0 && (
          <div className="rounded-xl border border-dashed border-zinc-800 p-8 text-center text-zinc-500">
            Nessun brano nell'EP. Aggiungine uno dalla libreria beat.
          </div>
        )}
      </div>

      <button
        onClick={onAddTrack}
        className="flex items-center justify-center gap-2 rounded-lg border border-zinc-700 hover:border-violet-500 text-zinc-200 font-medium px-5 py-3 transition-colors w-full sm:w-auto"
      >
        <Plus size={18} /> Aggiungi nuovo brano
      </button>
    </div>
  );
}

/* =========================================================================
   EXPORT VIEW
   ========================================================================= */

function ExportView({ epTitle, tracks, beats, songs }) {
  const totalRuntime = tracks.reduce((sum, t) => sum + trackTotalDuration(t), 0);

  const buildPayload = () => ({
    epTitle,
    exportedAt: new Date().toISOString(),
    trackCount: tracks.length,
    totalRuntimeSeconds: totalRuntime,
    tracks: tracks.map((t, i) => {
      const beat = beats.find((b) => b.id === t.beatId);
      const song = songs.find((s) => s.id === t.songId);
      return {
        order: i + 1,
        title: t.title,
        mood: t.mood || null,
        status: trackIsComplete(t) ? 'complete' : 'in_progress',
        beat: beat
          ? { name: beat.name, bpm: beat.bpm, key: beat.key, duration: beat.duration, genre: beat.genre, tags: beat.tags }
          : null,
        referenceSong: song
          ? { name: song.name, bpm: song.bpm, key: song.key, duration: song.duration, genre: song.genre, tags: song.tags }
          : null,
        structure: t.structure.map((s) => ({ section: s.label, duration: s.duration, notes: s.notes })),
        lyrics: t.lyrics || null,
        totalDuration: trackTotalDuration(t),
      };
    }),
  });

  const downloadJSON = () => {
    const blob = new Blob([JSON.stringify(buildPayload(), null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `${epTitle.replace(/\s+/g, '_').toLowerCase()}.json`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  };

  const printSummary = () => window.print();

  return (
    <div className="space-y-6">
      <div>
        <p className="text-violet-400 text-xs font-mono uppercase tracking-widest mb-1">Finalizzazione</p>
        <h2 className="font-display text-2xl font-bold text-zinc-100">Export EP</h2>
        <p className="text-zinc-500 text-sm mt-1">Esporta la tracklist completa in JSON o stampala come riepilogo PDF.</p>
      </div>

      <div className="flex flex-wrap gap-3">
        <button
          onClick={downloadJSON}
          className="flex items-center gap-2 rounded-lg bg-gradient-to-r from-violet-600 to-blue-600 hover:from-violet-500 hover:to-blue-500 text-white font-medium px-5 py-3 transition-all"
        >
          <FileJson size={18} /> Esporta JSON
        </button>
        <button
          onClick={printSummary}
          className="flex items-center gap-2 rounded-lg border border-zinc-700 hover:border-violet-500 text-zinc-200 font-medium px-5 py-3 transition-colors"
        >
          <Printer size={18} /> Stampa / Salva come PDF
        </button>
      </div>

      <div className="rounded-xl border border-zinc-800 bg-zinc-900/80 p-5 space-y-5">
        <div className="flex items-center justify-between border-b border-zinc-800 pb-4">
          <div>
            <h3 className="font-display text-xl font-bold text-zinc-100">{epTitle}</h3>
            <p className="text-xs text-zinc-500 mt-1">{tracks.length} brani · durata totale {formatTime(totalRuntime)}</p>
          </div>
          <div className="w-12 h-12 rounded-lg bg-gradient-to-br from-violet-500 to-lime-400 flex items-center justify-center shrink-0">
            <Music2 size={20} className="text-zinc-950" />
          </div>
        </div>

        {tracks.map((t, i) => {
          const beat = beats.find((b) => b.id === t.beatId);
          const song = songs.find((s) => s.id === t.songId);
          return (
            <div key={t.id} className="border-b border-zinc-800/60 pb-4 last:border-b-0 last:pb-0">
              <div className="flex items-center justify-between flex-wrap gap-2 mb-2">
                <h4 className="font-display font-semibold text-zinc-100">
                  {i + 1}. {t.title}
                </h4>
                <StatusBadge complete={trackIsComplete(t)} />
              </div>
              {beat ? (
                <p className="text-xs text-zinc-400 font-mono mb-2">
                  Beat: {beat.name} · {beat.bpm} BPM · {beat.key} {t.mood && `· mood: ${t.mood}`}
                </p>
              ) : (
                <p className="text-xs text-zinc-500 mb-2">Nessun beat assegnato</p>
              )}
              {song && (
                <p className="text-xs text-zinc-400 font-mono mb-2">
                  Rif. canzone: {song.name} · {song.bpm} BPM · {song.key}
                </p>
              )}
              <div className="flex flex-wrap gap-1.5">
                {t.structure.map((s) => (
                  <Pill key={s.id} className="bg-zinc-800/60 text-zinc-300 border-zinc-700">
                    {s.label} · {formatTime(s.duration)}
                  </Pill>
                ))}
              </div>
              {t.lyrics && t.lyrics.trim() && (
                <details className="mt-2">
                  <summary className="text-xs text-violet-300 cursor-pointer hover:text-lime-300 transition-colors">Mostra testo</summary>
                  <pre className="mt-2 whitespace-pre-wrap text-xs text-zinc-300 font-mono bg-zinc-950 border border-zinc-800 rounded-lg p-3">{t.lyrics}</pre>
                </details>
              )}
            </div>
          );
        })}

        {tracks.length === 0 && <p className="text-zinc-500 text-sm">L'EP è ancora vuoto.</p>}
      </div>
    </div>
  );
}

// Identifies this browser tab so we can recognize (and ignore) our own
// writes when they echo back through the real-time subscription — without
// this, a save firing while you're still typing could revert your latest
// keystrokes back to what was just saved a moment earlier.
const CLIENT_ID = Math.random().toString(36).slice(2) + Date.now().toString(36);

function App() {
  const [epTitle, setEpTitle] = useState('Echoes EP');
  const [activeView, setActiveView] = useState('dashboard');
  const [selectedTrackId, setSelectedTrackId] = useState('seed1');
  const [beatNotes, setBeatNotes] = useState({});
  const [songNotes, setSongNotes] = useState({});
  const [lastSaved, setLastSaved] = useState('ora');
  const [saveError, setSaveError] = useState(false);
  const [hydrated, setHydrated] = useState(false);
  const [customBeats, setCustomBeats] = useState([]);
  const [customSongs, setCustomSongs] = useState([]);
  // Edits (rename, BPM fix, ecc.) made to a PRELOADED beat/song — these
  // can't mutate MOCK_BEATS/MOCK_SONGS directly (they're hardcoded in the
  // file), so we keep a small patch per id instead, synced like everything
  // else so every collaborator sees the correction too.
  const [beatOverrides, setBeatOverrides] = useState({});
  const [songOverrides, setSongOverrides] = useState({});
  const [storageMode] = useState(cloudReady ? 'cloud' : 'local');
  const [syncing, setSyncing] = useState(false);

  const allBeats = [
    ...MOCK_BEATS.map((b) => ({ ...b, ...(beatOverrides[b.id] || {}) })),
    ...customBeats,
  ];
  const allSongs = [
    ...MOCK_SONGS.map((s) => ({ ...s, ...(songOverrides[s.id] || {}) })),
    ...customSongs,
  ];

  const [tracks, setTracks] = useState(() => [
    {
      id: 'seed1',
      title: 'Lost Frequencies',
      beatId: 'rako1',
      songId: null,
      mood: 'dark',
      lyrics: '',
      structure: newStructure(),
    },
  ]);

  // audio preview state — a single shared <audio> element is reused for every
  // beat/song; positionsRef remembers the last known playback position (in
  // seconds) per item id, so pausing or switching away never loses the spot.
  const [playState, setPlayState] = useState({ id: null, playing: false, progress: 0 });
  const playIntervalRef = useRef(null);
  const audioRef = useRef(null);
  const positionsRef = useRef({});
  const applyingRemoteRef = useRef(false);

  // Apply a freshly loaded/synced project document to local state. Cloud
  // audio URLs are used directly; anything else falls back to whatever
  // this browser has cached locally.
  const applyProjectData = async (saved) => {
    applyingRemoteRef.current = true;
    if (typeof saved.epTitle === 'string') setEpTitle(saved.epTitle);
    if (Array.isArray(saved.tracks)) {
      setTracks(saved.tracks.map((t) => ({ songId: null, lyrics: '', ...t })));
    }
    if (saved.beatNotes) setBeatNotes(saved.beatNotes);
    if (saved.songNotes) setSongNotes(saved.songNotes);
    if (saved.beatOverrides) setBeatOverrides(saved.beatOverrides);
    if (saved.songOverrides) setSongOverrides(saved.songOverrides);

    if (Array.isArray(saved.customBeats)) {
      const restored = await Promise.all(
        saved.customBeats.map(async (b) => ({ ...b, audioUrl: await resolveAudioUrl(b, 'beat') }))
      );
      setCustomBeats(restored);
    }
    if (Array.isArray(saved.customSongs)) {
      const restored = await Promise.all(
        saved.customSongs.map(async (s) => ({ ...s, audioUrl: await resolveAudioUrl(s, 'song') }))
      );
      setCustomSongs(restored);
    }
    // let the next tick's autosave effect see this as "not a local edit"
    setTimeout(() => { applyingRemoteRef.current = false; }, 0);
  };

  /* ---------------------------------------------------------------------
     Load + (when Firebase is configured) live-sync the project.
     - Cloud mode: a single Firestore onSnapshot subscription both loads the
       project on mount AND pushes every future change from any
       collaborator, in real time — no polling needed.
     - Local mode: one-time load from this browser's IndexedDB.
     --------------------------------------------------------------------- */
  useEffect(() => {
    let cancelled = false;

    if (cloudReady) {
      const unsubscribe = subscribeToProjectData(
        async (data, isOwnPendingWrite) => {
          if (cancelled) return;
          const isOwnWrite = isOwnPendingWrite || (data && data.savedBy === CLIENT_ID);
          if (isOwnWrite) {
            // Either our own optimistic local echo, or the server's
            // confirmation of a write we made — our state already
            // reflects it (or has moved on since), so don't reapply it.
            if (!hydrated) setHydrated(true);
            return;
          }
          if (data) await applyProjectData(data);
          if (!hydrated) setHydrated(true);
        },
        (err) => {
          console.warn('Sincronizzazione con Firebase non riuscita:', err);
          if (!cancelled) {
            setSaveError(true);
            setHydrated(true);
          }
        }
      );
      return () => {
        cancelled = true;
        unsubscribe();
      };
    }

    (async () => {
      try {
        const saved = await loadProjectData();
        if (saved && !cancelled) await applyProjectData(saved);
      } catch (err) {
        console.warn('Impossibile caricare il progetto salvato:', err);
      } finally {
        if (!cancelled) setHydrated(true);
      }
    })();
    return () => {
      cancelled = true;
    };
  }, []);

  /* ---------------------------------------------------------------------
     Autosave whenever the project changes (debounced so rapid edits don't
     trigger a write per keystroke). Goes to Firestore when configured,
     otherwise to this browser's IndexedDB. Skipped right after we just
     applied a remote update, so we don't immediately "save" what we only
     just received.
     --------------------------------------------------------------------- */
  useEffect(() => {
    if (!hydrated || applyingRemoteRef.current) return;
    const t = setTimeout(() => {
      saveProjectData({
        epTitle,
        tracks,
        beatNotes,
        songNotes,
        beatOverrides: sanitizeOverridesForSave(beatOverrides),
        songOverrides: sanitizeOverridesForSave(songOverrides),
        customBeats: customBeats.map(sanitizeForSave),
        customSongs: customSongs.map(sanitizeForSave),
        savedBy: CLIENT_ID,
      })
        .then(() => {
          setLastSaved('ora');
          setSaveError(false);
        })
        .catch((err) => {
          console.warn('Salvataggio non riuscito:', err);
          setSaveError(true);
        });
    }, 500);
    return () => clearTimeout(t);
  }, [epTitle, tracks, beatNotes, songNotes, beatOverrides, songOverrides, customBeats, customSongs, hydrated]);

  const handleManualSync = async () => {
    if (!cloudReady) return;
    setSyncing(true);
    try {
      const remote = await loadProjectData();
      if (remote) await applyProjectData(remote);
    } catch (err) {
      console.warn('Sincronizzazione manuale non riuscita:', err);
    } finally {
      setSyncing(false);
    }
  };

  /* ---------------------------------------------------------------------
     Playback: pausing keeps the position (no reset to 0); clicking a point
     on the seek bar moves the position there, ready for the next play.
     --------------------------------------------------------------------- */
  const togglePlay = (item) => {
    const isCurrent = playState.id === item.id;

    // Pause: remember exactly where we were.
    if (isCurrent && playState.playing) {
      clearInterval(playIntervalRef.current);
      if (audioRef.current && item.audioUrl) {
        positionsRef.current[item.id] = audioRef.current.currentTime;
        audioRef.current.pause();
      } else {
        positionsRef.current[item.id] = (playState.progress / 100) * (item.duration || 0);
      }
      setPlayState((prev) => ({ ...prev, playing: false }));
      return;
    }

    // Switching away from whatever else was playing: save its position too.
    if (playState.id && playState.id !== item.id && audioRef.current) {
      positionsRef.current[playState.id] = audioRef.current.currentTime;
      audioRef.current.pause();
    }
    clearInterval(playIntervalRef.current);

    const startSeconds = positionsRef.current[item.id] || 0;

    if (item.audioUrl) {
      const audio = audioRef.current;
      if (!isCurrent) audio.src = item.audioUrl;
      audio.currentTime = startSeconds;
      audio.play();
      setPlayState({ id: item.id, playing: true, progress: item.duration ? (startSeconds / item.duration) * 100 : 0 });
      return;
    }

    // No local audio file available — simulate a sped-up preview from the
    // remembered position (used e.g. for items a collaborator hasn't
    // attached locally yet).
    const stepMs = 80;
    const totalSteps = Math.max((item.duration * 1000) / stepMs / 6, 1);
    let step = (startSeconds / Math.max(item.duration, 1)) * totalSteps;
    setPlayState({ id: item.id, playing: true, progress: (step / totalSteps) * 100 });
    playIntervalRef.current = setInterval(() => {
      step += 1;
      const pct = (step / totalSteps) * 100;
      if (pct >= 100) {
        clearInterval(playIntervalRef.current);
        positionsRef.current[item.id] = 0;
        setPlayState({ id: null, playing: false, progress: 0 });
        return;
      }
      positionsRef.current[item.id] = (pct / 100) * item.duration;
      setPlayState({ id: item.id, playing: true, progress: pct });
    }, stepMs);
  };

  const seekTo = (item, fraction) => {
    const newTime = fraction * (item.duration || 0);
    positionsRef.current[item.id] = newTime;

    if (playState.id === item.id) {
      if (audioRef.current && item.audioUrl) audioRef.current.currentTime = newTime;
      setPlayState((prev) => ({ ...prev, progress: fraction * 100 }));
      return;
    }

    // Seeking on an item that wasn't active: load it paused at that spot,
    // so the next press of play starts exactly there.
    if (audioRef.current && playState.id) {
      positionsRef.current[playState.id] = audioRef.current.currentTime;
      audioRef.current.pause();
    }
    clearInterval(playIntervalRef.current);
    if (audioRef.current && item.audioUrl) {
      audioRef.current.src = item.audioUrl;
      audioRef.current.currentTime = newTime;
    }
    setPlayState({ id: item.id, playing: false, progress: fraction * 100 });
  };

  const handleAudioTimeUpdate = () => {
    const audio = audioRef.current;
    if (!audio || !audio.duration) return;
    setPlayState((prev) => {
      if (!prev.playing) return prev;
      if (prev.id) positionsRef.current[prev.id] = audio.currentTime;
      return { ...prev, progress: (audio.currentTime / audio.duration) * 100 };
    });
  };

  const handleAudioEnded = () => {
    setPlayState((prev) => {
      if (prev.id) positionsRef.current[prev.id] = 0;
      return { id: null, playing: false, progress: 0 };
    });
  };

  useEffect(
    () => () => {
      clearInterval(playIntervalRef.current);
      if (audioRef.current) audioRef.current.pause();
    },
    []
  );

  const handleNotesChange = (beatId, value) => setBeatNotes((prev) => ({ ...prev, [beatId]: value }));
  const handleNotesChangeSong = (songId, value) => setSongNotes((prev) => ({ ...prev, [songId]: value }));

  const handleEditBeat = (beatId, patch) => {
    if (MOCK_BEATS.some((b) => b.id === beatId)) {
      setBeatOverrides((prev) => ({ ...prev, [beatId]: { ...prev[beatId], ...patch } }));
    } else {
      setCustomBeats((prev) => prev.map((b) => (b.id === beatId ? { ...b, ...patch } : b)));
    }
  };

  const handleEditSong = (songId, patch) => {
    if (MOCK_SONGS.some((s) => s.id === songId)) {
      setSongOverrides((prev) => ({ ...prev, [songId]: { ...prev[songId], ...patch } }));
    } else {
      setCustomSongs((prev) => prev.map((s) => (s.id === songId ? { ...s, ...patch } : s)));
    }
  };

  // Lets someone attach audio for an item whose metadata is there but the
  // file isn't playable yet on their device (e.g. cloud upload hadn't
  // finished, or this is local-only mode). Works for both preloaded
  // (MOCK_BEATS/MOCK_SONGS) and uploaded items.
  const handleAttachAudio = async (item, file) => {
    const isPreloadedBeat = MOCK_BEATS.some((b) => b.id === item.id);
    const isPreloadedSong = !isPreloadedBeat && MOCK_SONGS.some((s) => s.id === item.id);
    const isCustomBeat = !isPreloadedBeat && !isPreloadedSong && customBeats.some((b) => b.id === item.id);
    const kind = isPreloadedBeat || isCustomBeat ? 'beat' : 'song';

    let cloudUrl = null;
    if (cloudReady) {
      try {
        cloudUrl = await uploadAudioToCloud(kind, item.id, file);
      } catch (err) {
        console.warn('Caricamento audio su Firebase non riuscito, resta solo locale:', err);
      }
    }
    const finalUrl = cloudUrl || URL.createObjectURL(file);

    if (isPreloadedBeat) {
      setBeatOverrides((prev) => ({ ...prev, [item.id]: { ...prev[item.id], audioUrl: finalUrl } }));
    } else if (isPreloadedSong) {
      setSongOverrides((prev) => ({ ...prev, [item.id]: { ...prev[item.id], audioUrl: finalUrl } }));
    } else if (isCustomBeat) {
      setCustomBeats((prev) => prev.map((x) => (x.id === item.id ? { ...x, audioUrl: finalUrl } : x)));
    } else {
      setCustomSongs((prev) => prev.map((x) => (x.id === item.id ? { ...x, audioUrl: finalUrl } : x)));
    }

    if (!cloudUrl) {
      idbSet('audio', kind + '_' + item.id, file).catch((err) => console.warn('Impossibile salvare il file audio in locale:', err));
    }
  };

  const handleDeleteCustomBeat = (beatId) => {
    setCustomBeats((prev) => {
      const target = prev.find((b) => b.id === beatId);
      if (target?.audioUrl && target.audioUrl.startsWith('blob:')) URL.revokeObjectURL(target.audioUrl);
      return prev.filter((b) => b.id !== beatId);
    });
    setTracks((prev) => prev.map((t) => (t.beatId === beatId ? { ...t, beatId: null } : t)));
    idbDelete('audio', 'beat_' + beatId).catch(() => {});
    deleteAudioFromCloud('beat', beatId);
    delete positionsRef.current[beatId];
    if (playState.id === beatId) {
      clearInterval(playIntervalRef.current);
      if (audioRef.current) {
        audioRef.current.pause();
        audioRef.current.currentTime = 0;
      }
      setPlayState({ id: null, playing: false, progress: 0 });
    }
  };

  const handleDeleteCustomSong = (songId) => {
    setCustomSongs((prev) => {
      const target = prev.find((s) => s.id === songId);
      if (target?.audioUrl && target.audioUrl.startsWith('blob:')) URL.revokeObjectURL(target.audioUrl);
      return prev.filter((s) => s.id !== songId);
    });
    setTracks((prev) => prev.map((t) => (t.songId === songId ? { ...t, songId: null } : t)));
    idbDelete('audio', 'song_' + songId).catch(() => {});
    deleteAudioFromCloud('song', songId);
    delete positionsRef.current[songId];
    if (playState.id === songId) {
      clearInterval(playIntervalRef.current);
      if (audioRef.current) {
        audioRef.current.pause();
        audioRef.current.currentTime = 0;
      }
      setPlayState({ id: null, playing: false, progress: 0 });
    }
  };

  const handleAddToEp = (beat) => {
    const t = newTrack(beat.id);
    t.title = beat.name;
    setTracks((prev) => [...prev, t]);
    setSelectedTrackId(t.id);
    setActiveView('builder');
  };

  const handleAddSongToEp = (song) => {
    const t = newTrack(null, song.id);
    t.title = song.name;
    setTracks((prev) => [...prev, t]);
    setSelectedTrackId(t.id);
    setActiveView('builder');
  };

  const handleAddBlankTrack = () => {
    const t = newTrack(null);
    t.title = `Brano ${tracks.length + 1}`;
    setTracks((prev) => [...prev, t]);
    setSelectedTrackId(t.id);
    setActiveView('builder');
  };

  const handleOpenTrack = (id) => {
    setSelectedTrackId(id);
    setActiveView('builder');
  };

  const handleDeleteTrack = (id) => {
    setTracks((prev) => prev.filter((t) => t.id !== id));
    if (selectedTrackId === id) setSelectedTrackId(null);
  };

  const handleReorderTracks = (from, to) => setTracks((prev) => moveItem(prev, from, to));

  const selectedTrack = tracks.find((t) => t.id === selectedTrackId) || null;

  const updateSelectedTrack = (patch) => {
    setTracks((prev) => prev.map((t) => (t.id === selectedTrackId ? { ...t, ...patch } : t)));
  };

  const completed = tracks.filter(trackIsComplete).length;
  const progress = tracks.length ? (completed / tracks.length) * 100 : 0;

  if (!hydrated) {
    return (
      <div className="flex min-h-screen items-center justify-center bg-zinc-950 text-zinc-400">
        <style>{`
          @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');
          .font-display { font-family: 'Space Grotesk', sans-serif; }
          body, .font-body { font-family: 'Inter', sans-serif; }
        `}</style>
        <div className="flex flex-col items-center gap-3 font-body">
          <div className="w-10 h-10 rounded-lg bg-gradient-to-br from-violet-500 to-lime-400 flex items-center justify-center animate-pulse">
            <Music2 size={20} className="text-zinc-950" />
          </div>
          <p className="text-sm">Caricamento del progetto salvato…</p>
        </div>
      </div>
    );
  }

  return (
    <div className="flex min-h-screen bg-zinc-950 text-zinc-200">
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');
        .font-display { font-family: 'Space Grotesk', sans-serif; }
        body, .font-body { font-family: 'Inter', sans-serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
      `}</style>

      <audio ref={audioRef} onTimeUpdate={handleAudioTimeUpdate} onEnded={handleAudioEnded} className="hidden" />

      <Sidebar activeView={activeView} setActiveView={setActiveView} />

      <div className="flex-1 flex flex-col min-w-0 pb-16 md:pb-0">
        <TopBar
          epTitle={epTitle}
          setEpTitle={setEpTitle}
          progress={progress}
          lastSaved={lastSaved}
          saveError={saveError}
          storageMode={storageMode}
          syncing={syncing}
          onSync={handleManualSync}
        />

        <main className="flex-1 px-4 md:px-8 py-6 max-w-5xl w-full mx-auto font-body">
          {activeView === 'dashboard' && (
            <Dashboard
              epTitle={epTitle}
              tracks={tracks}
              beats={allBeats}
              songs={allSongs}
              onAddTrack={handleAddBlankTrack}
              onOpenTrack={handleOpenTrack}
              onGoLibrary={() => setActiveView('library')}
              onGoSongLibrary={() => setActiveView('songLibrary')}
              playState={playState}
              onTogglePlay={togglePlay}
            />
          )}

          {activeView === 'library' && (
            <MediaLibrary
              kind="beat"
              items={allBeats}
              onAddToEp={handleAddToEp}
              playState={playState}
              onTogglePlay={togglePlay}
              onSeek={seekTo}
              itemNotes={beatNotes}
              onNotesChange={handleNotesChange}
              onDeleteItem={handleDeleteCustomBeat}
              onEditItem={handleEditBeat}
              onAttachAudio={handleAttachAudio}
            />
          )}

          {activeView === 'songLibrary' && (
            <MediaLibrary
              kind="song"
              items={allSongs}
              onAddToEp={handleAddSongToEp}
              playState={playState}
              onTogglePlay={togglePlay}
              onSeek={seekTo}
              itemNotes={songNotes}
              onNotesChange={handleNotesChangeSong}
              onDeleteItem={handleDeleteCustomSong}
              onEditItem={handleEditSong}
              onAttachAudio={handleAttachAudio}
            />
          )}

          {activeView === 'builder' && (
            <div className="space-y-4">
              <button
                onClick={() => setActiveView('tracker')}
                className="flex items-center gap-1.5 text-xs text-zinc-500 hover:text-violet-300 transition-colors"
              >
                <ArrowLeft size={14} /> Torna all'EP Tracker
              </button>
              <SongBuilder
                track={selectedTrack}
                allTracks={tracks}
                beats={allBeats}
                songs={allSongs}
                onChangeTitle={(title) => updateSelectedTrack({ title })}
                onChangeMood={(mood) => updateSelectedTrack({ mood })}
                onChangeBeat={(beatId) => updateSelectedTrack({ beatId })}
                onChangeSong={(songId) => updateSelectedTrack({ songId })}
                onChangeLyrics={(lyrics) => updateSelectedTrack({ lyrics })}
                onUpdateStructure={(structure) => updateSelectedTrack({ structure })}
                playState={playState}
                onTogglePlay={togglePlay}
                onSeek={seekTo}
                onAttachAudio={handleAttachAudio}
                beatNotes={beatNotes}
                onNotesChange={handleNotesChange}
                songNotes={songNotes}
                onNotesChangeSong={handleNotesChangeSong}
              />
            </div>
          )}

          {activeView === 'tracker' && (
            <EPTracker
              tracks={tracks}
              beats={allBeats}
              songs={allSongs}
              onReorder={handleReorderTracks}
              onOpenTrack={handleOpenTrack}
              onDeleteTrack={handleDeleteTrack}
              onAddTrack={handleAddBlankTrack}
            />
          )}

          {activeView === 'export' && <ExportView epTitle={epTitle} tracks={tracks} beats={allBeats} songs={allSongs} />}
        </main>
      </div>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
